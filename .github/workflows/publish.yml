name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -s $(which fdfind) /usr/local/bin/fd

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build all workspace packages
        run: npm run build

      - name: Run checks
        run: npm run check

      - name: Regenerate shrinkwrap
        run: npm run shrinkwrap:coding-agent

      - name: Publish
        working-directory: packages/coding-agent
        run: npm publish --access public --tag xyz
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
